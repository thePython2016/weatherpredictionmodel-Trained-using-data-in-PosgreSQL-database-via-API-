<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create an Account</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      display: flex;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      width: 860px;
      min-height: 520px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    /* LEFT SECTION */
    .left {
      flex: 1;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .star {
      font-size: 28px;
      color: #7F77DD;
      font-weight: 700;
    }

    .tagline {
      font-size: 12px;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .headline {
      font-size: 26px;
      font-weight: 500;
      color: #1a1a1a;
      line-height: 1.4;
    }

    /* DIVIDER */
    .divider-v {
      width: 1px;
      background: #e5e5e5;
      margin: 2rem 0;
    }

    /* RIGHT SECTION */
    .right {
      flex: 1;
      padding: 3rem 2.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-star {
      font-size: 22px;
      color: #7F77DD;
      font-weight: 700;
      margin-bottom: 1.25rem;
    }

    .form-title {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .field-wrap { margin-bottom: 1.25rem; }

    .field-label {
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      display: block;
    }

    .input-row { position: relative; }

    .input-row input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      outline: none;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #7F77DD;
      box-shadow: 0 0 0 3px rgba(127,119,221,0.15);
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      font-size: 16px;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #7F77DD;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 1.25rem;
    }

    .submit-btn:hover { background: #534AB7; }

    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }

    .or-divider span {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .social-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      flex: 1;
      padding: 9px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .social-btn:hover { background: #f5f5f5; }

    .signup-row {
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    .signup-row a {
      color: #7F77DD;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- LEFT -->
    <div class="left">
      <div class="star">✳</div>
      <div>
        <p class="tagline">You can verify</p>
        <h2 class="headline">Get access your personal<br>hub for clarity and<br>productivity</h2>
      </div>
    </div>

    <!-- VERTICAL DIVIDER -->
    <div class="divider-v"></div>

    <!-- RIGHT -->
    <div class="right">
      <div class="form-star">✳</div>
      <h1 class="form-title">Create an account</h1>
      <p class="form-sub">
        Access your tasks, notes, and projects anytime,<br>
        anywhere — and keep everything flowing in one place.
      </p>

      <div class="field-wrap">
        <label class="field-label">Your email</label>
        <div class="input-row">
          <input type="email" placeholder="hello@example.com" />
        </div>
      </div>

      <div class="field-wrap">
        <label class="field-label">Password</label>
        <div class="input-row">
          <input type="password" id="pwd" value="mypassword" />
          <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <button class="submit-btn">Get started</button>

      <div class="or-divider"><span>or continue with</span></div>

      <div class="social-row">
        <button class="social-btn">
          <!-- Google SVG -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="social-btn">
          <!-- GitHub SVG -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.14 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </button>
        <button class="social-btn">
          <!-- Facebook SVG -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2">
            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
          </svg>
          Facebook
        </button>
      </div>

      <p class="signup-row">
        Don't have an account? <a href="#">Sign up</a>
      </p>
    </div>

  </div>

  <script>
    function togglePwd() {
      const input = document.getElementById('pwd');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

</body>
</html>
