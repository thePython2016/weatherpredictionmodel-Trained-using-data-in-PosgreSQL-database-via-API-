<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="css/sign-up.css"/>
  <style>
    .field-error {
      color: #E24B4A;
      font-size: 11px;
      margin-bottom: 4px;
      display: none;
    }
    .field-error.show {
      display: block;
    }
    .forgot-pwd {
      text-align: right;
      margin-top: 6px;
    }
    .forgot-pwd a {
      color: #7F77DD;
      text-decoration: none;
      font-size: 12px;
    }
    .welcome-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f3f2fd;
      border-left: 3px solid #7F77DD;
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }
    .welcome-banner i {
      font-size: 22px;
      color: #7F77DD;
    }
    .welcome-banner div p:first-child {
      font-size: 14px;
      font-weight: 500;
      color: #7F77DD;
      margin: 0;
    }
    .welcome-banner div p:last-child {
      font-size: 11px;
      color: #888;
      margin: 0;
    }
  </style>
</head>
<body>
  <script>
    document.getElementById('pwd').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});
  </script>

  <div class="card">

    <!-- LEFT -->
    <div class="left">
      <div></div>
    </div>

    <!-- VERTICAL DIVIDER -->
    <div class="divider-v"></div>

    <!-- RIGHT -->
    <div class="right">

      <h1 class="form-title">Welcome Back!</h1>
      <p class="form-sub">
        Sign in to continue with your account.<br>
      </p>


      <div class="field-wrap">
        <label class="field-label">Email</label>
        <p class="field-error" id="email-error"></p>
        <div class="input-row">
          <input type="email" id="email" placeholder="hello@example.com" />
        </div>
      </div>

      <div class="field-wrap">
        <label class="field-label">Password</label>
        <p class="field-error" id="pwd-error"></p>
        <div class="input-row">
          <input type="password" id="pwd" placeholder="Enter your password" />
          <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
        <p class="forgot-pwd">
          <a href="forgot-password.html">Forgot password?</a>
        </p>
      </div>

      <button class="submit-btn" id="loginBtn">Sign in</button>

      <div class="social-row"></div>

      <p class="signup-row">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>

    </div>
  </div>

  <div id="success"></div>
  <div id="backError"></div>

  <script>
    function togglePwd() {
      const input = document.getElementById('pwd');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showFieldError(fieldId, message) {
      const errorEl = document.getElementById(`${fieldId}-error`);
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function clearFieldErrors() {
      document.querySelectorAll('.field-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('show');
      });
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      clearFieldErrors();

      const email = document.getElementById('email').value.trim();
      const pwd   = document.getElementById('pwd').value;

      let hasError = false;

      if (!email) {
        showFieldError('email', 'Email is required');
        hasError = true;
      }
      if (!pwd) {
        showFieldError('pwd', 'Password is required');
        hasError = true;
      }

      if (hasError) return;

      const credentials = { email: email, password: pwd };

      try {
        const base     = "http://127.0.0.1:8000";
        const endPoint = "/authenticate/";

        const response = await fetch(`${base}${endPoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",  
          body: JSON.stringify(credentials)
        });

        const status = await response.json();

        if (response.status === 200) {
          sessionStorage.setItem("Email", status.email);
          sessionStorage.setItem("Name", status.fname);
          
          window.location.href = "weather-by-region.html";
          
        } else {
          document.getElementById("backError").innerHTML = `Error: ${status.detail}`;
          alert(status.detail)
        }

      } catch (error) {
        document.getElementById("backError").innerHTML = `Error: ${error.message}`;
      }
    });
  </script>

</body>
</html>
