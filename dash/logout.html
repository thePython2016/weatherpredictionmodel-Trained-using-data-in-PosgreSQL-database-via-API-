<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Logging out...</title>
</head>
<body>
  <p>Logging out...</p>
  <script>
    async function logout() {
      try {
        await fetch("/logout/", { method: "POST", credentials: "include" });
      } catch (err) {
        console.error("Logout request failed:", err);
      } finally {
        // ✅ Always clear local data even if request fails
        sessionStorage.clear();
        localStorage.clear();

        // ✅ Correct path to match your actual signin page
        history.pushState(null, "", "/dash/signin.html");
        window.onpopstate = () => history.pushState(null, "", "/dash/signin.html");

        window.location.replace("/dash/signin.html");
      }
    }

    logout();
  </script>
</body>
</html>
