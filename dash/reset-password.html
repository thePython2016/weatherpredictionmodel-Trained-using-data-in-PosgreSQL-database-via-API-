<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="/dash/css/sign-up.css"/>
  <style>
    .field-error { color: #E24B4A; font-size: 11px; margin-bottom: 4px; display: none; }
    .field-error.show { display: block; }
  </style>
</head>
<body>
  <script src="token-check.js"></script>

  <div class="card">
    <div class="left"></div>
    <div class="divider-v"></div>
    <div class="right">

      <h1 class="form-title">Reset Password</h1>
      <p class="form-sub">Enter your new password below.</p>

      <div class="field-wrap">
        <label class="field-label">New Password</label>
        <p class="field-error" id="pwd-error"></p>
        <div class="input-row">
          <input type="password" id="new-pwd" placeholder="Enter new password" />
          <button class="eye-btn" onclick="togglePwd('new-pwd')" aria-label="Toggle password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <div class="field-wrap">
        <label class="field-label">Confirm Password</label>
        <p class="field-error" id="confirm-error"></p>
        <div class="input-row">
          <input type="password" id="confirm-pwd" placeholder="Confirm new password" />
          <button class="eye-btn" onclick="togglePwd('confirm-pwd')" aria-label="Toggle password">
            <i class="ti ti-eye"></i>
          </button>
        </div>
      </div>

      <div id="backError" style="color:#E24B4A; font-size:12px; min-height:16px;"></div>

      <button class="submit-btn" id="resetBtn" onclick="resetPassword()">
        Reset Password
      </button>

      <div id="successMsg" style="display:none; color:green; font-size:13px; margin-top:10px;">
        ✓ Password updated! Redirecting to signin...
      </div>

      <p class="signup-row">Remembered it? <a href="/dash/signin.html">Back to signin</a></p>
    </div>
  </div>

  <script>
    // get token from URL automatically
    const token = new URLSearchParams(window.location.search).get('token');

    function togglePwd(fieldId) {
      const input = document.getElementById(fieldId);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    const resetPassword = async () => {
      document.getElementById('pwd-error').classList.remove('show');
      document.getElementById('confirm-error').classList.remove('show');
      document.getElementById('backError').textContent = '';
      document.getElementById('successMsg').style.display = 'none';

      const newPwd     = document.getElementById('new-pwd').value;
      const confirmPwd = document.getElementById('confirm-pwd').value;

      if (!newPwd) {
        const err = document.getElementById('pwd-error');
        err.textContent = 'Password is required';
        err.classList.add('show');
        return;
      }

      if (newPwd !== confirmPwd) {
        const err = document.getElementById('confirm-error');
        err.textContent = 'Passwords do not match';
        err.classList.add('show');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.textContent = 'Updating...';
      btn.disabled = true;

      const base     = "http://127.0.0.1:8000/";
      const endpoint = "reset-password/";

      try {
        const response = await fetch(`${base}${endpoint}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, password: newPwd })
        });

        const text = await response.json();
        if(response.status==200){
        // alert(result);  // ✅ add this to see full response
        alert(text.Success)
         alert(text.token)
         alert(text.pass)
         alert(response.statusText)
        }
        let result;
        try { result = JSON.parse(text); }
        catch { result = { detail: text }; }

        if (response.status === 500) {
          document.getElementById('backError').textContent = `Server Error: ${result.detail}`;
        } else if (response.status === 400) {
          document.getElementById('backError').textContent = result.detail;
        } else if (response.status === 201) {
          document.getElementById('successMsg').style.display = 'block';
          setTimeout(() => window.location.href = '/dash/signin.html', 2000);
        }

      } catch (error) {
        document.getElementById('backError').textContent = `Error: ${error.message}`;
      } finally {
        btn.textContent = 'Reset Password';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
