<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="css/sign-up.css"/>
  <style>
    .field-error { color: #E24B4A; font-size: 11px; margin-bottom: 4px; display: none; }
    .field-error.show { display: block; }
  </style>
</head>
<body>
  <script src="token-check.js"></script>

  <div class="card">
    <div class="left"></div>
    <div class="divider-v"></div>
    <div class="right">

      <h1 class="form-title">Forgot password?</h1>
      <p class="form-sub">Enter your email and we'll send you a reset link.</p>

      <div class="field-wrap">
        <label class="field-label">Email</label>
        <p class="field-error" id="email-error"></p>
        <div class="input-row">
          <input type="email" id="email" placeholder="hello@example.com" />
        </div>
      </div>

      <div id="backError" style="color:#E24B4A; font-size:12px; min-height:16px;"></div>

      <button class="submit-btn" id="resetBtn" onclick="sendReset()">
        Send reset link
      </button>

      <div id="successMsg" style="display:none; color:green; font-size:13px; margin-top:10px;">
        ✓ Reset link sent! Check your inbox.
      </div>

      <p class="signup-row">Remembered it? <a href="signin.html">Back to signin</a></p>
    </div>
  </div>

  <script>
    const sendReset=async()=>{
      document.getElementById('email-error').classList.remove('show');
      document.getElementById('backError').textContent = '';
      document.getElementById('successMsg').style.display = 'none';

      const email = document.getElementById('email').value.trim();

      if (!email) {
        const err = document.getElementById('email-error');
        err.textContent = 'Email is required';
        err.classList.add('show');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      base="http://127.0.0.1:8000/";
      endpoint="forgot-password/";
      try{
        const response=await fetch(`${base}${endpoint}`,{
          method:"POST",
          headers:{
            "Content-Type":"application/json",
          },
          body:JSON.stringify({email:email})
        });
        const result=await response.json();

        if(response.status==500){
          alert(`Server Error ${result.detail}`);
          btn.textContent = 'Send reset link';
          btn.disabled = false;
          return;
        }
        else if(response.status==404){
          alert(`${result.detail}`);
          btn.textContent = 'Send reset link';
          btn.disabled = false;
          return;
        }
        else{
          alert(`Email address ${result.email}`);
          btn.textContent = 'Send reset link';
          btn.disabled = false;
          return;
        }
      }
      catch(error){
        console.log(`Error ${error}`);
        btn.textContent = 'Send reset link';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
