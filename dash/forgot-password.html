<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="stylesheet" href="css/sign-up.css"/>
  <style>
    .field-error { color: #E24B4A; font-size: 11px; margin-bottom: 4px; display: none; }
    .field-error.show { display: block; }
  </style>
</head>
<body>

  <div class="card">
    <div class="left"></div>
    <div class="divider-v"></div>
    <div class="right">

      <h1 class="form-title">Forgot password?</h1>
      <p class="form-sub">Enter your email and we'll send you a reset link.</p>

      <div class="field-wrap">
        <label class="field-label">Email</label>
        <p class="field-error" id="email-error"></p>
        <div class="input-row">
          <input type="email" id="email" placeholder="hello@example.com" />
        </div>
      </div>

      <div id="backError" style="color:#E24B4A; font-size:12px; min-height:16px;"></div>

      <button class="submit-btn" id="resetBtn" onclick="sendReset()">
        Send reset link
      </button>

      <div id="successMsg" style="display:none; color:green; font-size:13px; margin-top:10px;">
        ✓ Reset link sent! Check your inbox.
      </div>

      <p class="signup-row">Remembered it? <a href="signin.html">Back to signin</a></p>
    </div>
  </div>

  <script>
    async function sendReset() {
      document.getElementById('email-error').classList.remove('show');
      document.getElementById('backError').textContent = '';
      document.getElementById('successMsg').style.display = 'none';

      const email = document.getElementById('email').value.trim();

      if (!email) {
        const err = document.getElementById('email-error');
        err.textContent = 'Email is required';
        err.classList.add('show');
        return;
      }

      const btn = document.getElementById('resetBtn');
      btn.textContent = 'Sending...';
      btn.disabled = true;

      try {
        const response = await fetch('http://127.0.0.1:8000/forgot-password/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.status === 200) {
          document.getElementById('successMsg').style.display = 'block';
        } else {
          document.getElementById('backError').textContent = `Error: ${data.detail}`;
        }
      } catch (err) {
        document.getElementById('backError').textContent = `Error: ${err.message}`;
      } finally {
        btn.textContent = 'Send reset link';
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
